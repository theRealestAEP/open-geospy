services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: geospy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geospy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geospy}
      POSTGRES_DB: ${POSTGRES_DB:-geospy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geospy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geospy} -d ${POSTGRES_DB:-geospy}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  geospy_postgres_data:
